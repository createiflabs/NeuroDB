services:
  neurodb:
    image: createiflabs/neurodb:latest
    build: .
    container_name: neurodb
    ports:
      - "8000:8000"
    environment:
      NEURODB_DATA_DIR: /data
      NEURODB_AUTOSAVE_INTERVAL: "5"
      # Uncomment to require an API key on all data routes:
      # NEURODB_API_KEY: "change-me"
    volumes:
      - neurodb_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 4s
      retries: 3
      start_period: 5s

volumes:
  neurodb_data:

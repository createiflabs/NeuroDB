name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt -e .

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy neurodb

      - name: Test (pytest + coverage)
        run: pytest --cov=neurodb --cov-report=term-missing --cov-fail-under=85

      - name: Security lint (bandit)
        if: matrix.python-version == '3.12'
        run: bandit -q -r neurodb

      - name: Dependency audit (pip-audit)
        if: matrix.python-version == '3.12'
        run: pip-audit --strict || true  # report-only; do not block on advisories

  image-scan:
    name: Build & scan image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: neurodb:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: neurodb:scan
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: neurodb:scan
          format: spdx-json
          output-file: neurodb.sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: neurodb.sbom.spdx.json

  publish:
    name: Publish image
    needs: [test, image-scan]
    runs-on: ubuntu-latest
    # Publish on version tags only, behind the protected `release` environment.
    if: startsWith(github.ref, 'refs/tags/v')
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: createiflabs
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: createiflabs/neurodb
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Sync this README onto the Docker Hub repository page (Docker Hub does not
      # do this automatically). Best-effort: never fail the publish over it.
      - name: Sync README to Docker Hub
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v4
        with:
          username: createiflabs
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: createiflabs/neurodb
          short-description: "Content-addressable store powered by Modern Hopfield networks."
          readme-filepath: ./README.md
